name: Fetch Nifty 500 Correlation Data

on:
  schedule:
    # Runs every weekday at 06:30 UTC (12:00 IST) after NSE closes
    - cron: "30 6 * * 1-5"
  workflow_dispatch:     # allow manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - "fetch_data.py"
      - "data/ind_nifty500list (1).csv"

permissions:
  contents: write        # needed to commit corr_data.json back to repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy

      # 4. Run the fetch script
      - name: Run fetch_data.py
        run: python fetch_data.py

      # 5. Commit the generated data file back to the repo
      - name: Commit corr_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/corr_data.json
          git diff --staged --quiet || git commit -m "chore: update corr_data.json [skip ci]"
          git push
